# Redis 7 — cache mode cho Tita (DECISIONS A9, C5).
# Copy vào /etc/redis/redis.conf rồi `systemctl restart redis-server`.

# === Network ===
bind 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# === Security ===
# Replace bằng password thật trước khi apply. Lưu cùng PG password vào 1Password.
# Set bằng: sudo sed -i "s/__REDIS_PASSWORD__/<pwd>/" /etc/redis/redis.conf
requirepass __REDIS_PASSWORD__

# Disable dangerous commands trên prod
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""

# === Memory ===
maxmemory 256mb
maxmemory-policy allkeys-lru

# === Persistence (cache mode: RDB only, không AOF) ===
save 900 1
save 300 100
save 60  10000

appendonly no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

# === Logging ===
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled no

# === Clients ===
maxclients 200

# === Slow log ===
slowlog-log-slower-than 10000
slowlog-max-len 128

# === Latency ===
latency-monitor-threshold 100
