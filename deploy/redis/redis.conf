# Redis 7 — cache mode cho Tita (DECISIONS A9, C5).
# Container path mounted ở /usr/local/etc/redis/redis.conf (compose).
# Password passed via cmdline `--requirepass $REDIS_PASSWORD` (compose env), KHÔNG hardcode đây.

# === Network ===
# Container network namespace isolated; bind 0.0.0.0 OK vì port publish 127.0.0.1:6379 trên host.
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# === Security ===
# Disable dangerous commands trên prod
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""

# === Memory ===
maxmemory 256mb
maxmemory-policy allkeys-lru

# === Persistence (cache mode: RDB only, không AOF) ===
save 900 1
save 300 100
save 60  10000

appendonly no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# === Logging ===
# Container: log ra stdout cho `docker logs`. KHÔNG set logfile.
loglevel notice
syslog-enabled no

# === Clients ===
maxclients 200

# === Slow log ===
slowlog-log-slower-than 10000
slowlog-max-len 128

# === Latency ===
latency-monitor-threshold 100
