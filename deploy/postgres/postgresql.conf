# PostgreSQL 15 — production tuning cho Alibaba VPS 2C/4G Singapore.
# Drop-in style: copy vào /etc/postgresql/15/main/conf.d/99-tita.conf rồi restart.
# Debian default postgresql.conf đã có `include_dir = 'conf.d'`.
# KHÔNG replace toàn bộ postgresql.conf — Debian wrapper cần data_directory/hba_file/external_pid_file.
# Settings không liệt kê = giữ Debian default.

# === Connection ===
listen_addresses = 'localhost'      # KHÔNG mở public IP, Node connect qua loopback
port = 5432
max_connections = 50                # Node pool max=20 + buffer + maintenance

# === Memory (2C/4G box) ===
shared_buffers = 512MB              # ~13% RAM (không phải 25% với box nhỏ)
effective_cache_size = 2GB          # estimate OS file cache
work_mem = 4MB                      # per sort/hash op × max_connections
maintenance_work_mem = 64MB         # VACUUM, CREATE INDEX
wal_buffers = 16MB
huge_pages = try

# === Disk (SSD) ===
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# === Parallel ===
max_worker_processes = 2
max_parallel_workers = 2
max_parallel_workers_per_gather = 1
max_parallel_maintenance_workers = 1

# === WAL & checkpoint ===
wal_level = replica                 # default OK, để dành cho replication sau nếu cần
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
wal_compression = on
min_wal_size = 1GB
max_wal_size = 4GB

# === Autovacuum ===
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# === Logging ===
log_destination = 'stderr'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%a.log'  # 1 file/ngày trong tuần, ghi đè tuần sau
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 0

log_min_duration_statement = 1000   # log query > 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 1000
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'Asia/Ho_Chi_Minh'

# === Extensions ===
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 5000
pg_stat_statements.track = top

# === Locale ===
datestyle = 'iso, mdy'
timezone = 'Asia/Ho_Chi_Minh'
default_text_search_config = 'pg_catalog.english'

# === Safety ===
statement_timeout = 30000           # 30s — cùng giới hạn Node pool
idle_in_transaction_session_timeout = 60000
lock_timeout = 5000
