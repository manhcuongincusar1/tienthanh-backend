# PG access — chỉ cho local + loopback. KHÔNG mở public.
# Copy vào /etc/postgresql/15/main/pg_hba.conf, restart PG.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix socket — superuser maintenance (postgres user trên server)
local   all             postgres                                peer

# Unix socket — Node app local
local   tita_prod       tita_app                                scram-sha-256

# Loopback — Node app (docker host network hoặc bridge)
host    tita_prod       tita_app        127.0.0.1/32            scram-sha-256
host    tita_prod       tita_app        ::1/128                 scram-sha-256

# Docker bridge default 172.17.0.0/16 — chỉ enable nếu Node chạy trong container bridge mode.
# Khuyến nghị: dùng host network → comment dòng dưới.
host    tita_prod       tita_app        172.17.0.0/16           scram-sha-256

# Replication slot dành cho mở rộng tương lai (replica / WAL ship).
local   replication     postgres                                peer
