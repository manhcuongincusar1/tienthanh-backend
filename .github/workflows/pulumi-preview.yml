name: Pulumi Preview

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/pulumi-preview.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEPLOYER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEPLOYER }}
          aws-region: ap-southeast-1

      # E2 — PREVIEW ONLY. KHÔNG có `pulumi up` từ GHA, lead chạy local.
      - uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: tienthanh-prod
          work-dir: infra
          comment-on-pr: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
